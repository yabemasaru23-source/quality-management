<circle cx="534" cy="146" r="17" fill="#1f86ff"/>
<circle cx="598" cy="98" r="24" fill="#1aaf6b"/>
<path d="M587 98 L595 106 L610 90" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
<text x="521" y="256" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#0a4ea3">社長専属で完全解決</text>
