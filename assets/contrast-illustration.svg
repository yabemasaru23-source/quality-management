<text x="198" y="104" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#8893a3">?</text>
<text x="158" y="256" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#8893a3">社員に聞けない…</text>

