<title>「社員に聞けない」を社長専属で完全解決</title>
<desc>左：ひとりで悩み社員に聞けない社長（グレー）。右：専属パートナーがついて解決し自信を持つ社長（青）。</desc>
<defs>
<marker id="arc" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#f5b301" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
